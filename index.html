// ============================================================
const AskAnalyst = () => {
  const [open, setOpen] = useState(null);
  const renderLine = (line, idx) => {
    const parts = line.split(/(\*\*[^*]+\*\*)/g);
    return (
      <div key={idx} style={{ marginBottom: line === '' ? 8 : 0 }}>
        {parts.map((p, pi) =>
          p.startsWith('**') && p.endsWith('**')
            ? <strong key={pi} style={{ color: 'var(--text)' }}>{p.slice(2, -2)}</strong>
            : <span key={pi}>{p}</span>
        )}
      </div>
    );
  };
  return (
    <Card glow={true} style={{ marginBottom: 24, borderLeft: '3px solid var(--accent-2)' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8, flexWrap: 'wrap', gap: 12 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{
            width: 28, height: 28, borderRadius: 6, background: 'var(--accent-2)',
            display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, color: '#fff'
          }}>💬</div>
          <h2 style={{ fontSize: 16, fontWeight: 600, color: 'var(--text)' }}>Ask the Handoff Analyst</h2>
        </div>
        <SourceBadges sources={['Gainsight', 'Staircase', 'PX', 'Community', 'Skilljar']} />
      </div>
      <div style={{ fontSize: 12, color: 'var(--text-dim)', marginBottom: 16 }}>Pre-canned answers grounded in Gainsight + Staircase data · Click any question</div>
      <div style={{ display: 'grid', gap: 8 }}>
        {ANALYST_QA.map((qa, i) => (
          <div key={i} style={{
            background: 'var(--bg-3)', borderRadius: 8, border: '1px solid var(--border)',
            overflow: 'hidden'
          }}>
            <button
              onClick={() => setOpen(open === i ? null : i)}
              style={{
                width: '100%', textAlign: 'left', padding: 14, background: 'transparent',
                border: 'none', color: 'var(--text)', cursor: 'pointer',
                display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 10,
                fontSize: 13, fontWeight: 500
              }}
            >
              <span>{qa.q}</span>
              <span style={{ color: 'var(--accent-2)', fontSize: 16, transform: open === i ? 'rotate(90deg)' : 'none', transition: 'transform 0.2s' }}>›</span>
            </button>
            {open === i && (
              <div style={{
                padding: '14px', fontSize: 13, color: 'var(--text-body)', lineHeight: 1.65,
                borderTop: '1px solid var(--border)', whiteSpace: 'pre-wrap', background: 'var(--bg-1)'
              }}>
                {qa.a.split('\n').map(renderLine)}
              </div>
            )}
          </div>
        ))}
      </div>
    </Card>
  );
};

} catch (err) {
  document.getElementById('root').innerHTML =
    '<div style="padding:40px;color:#dc3626;font-family:monospace;">' +
    '<h2 style="margin-bottom:12px;">Render Error</h2>' +
    '<pre style="white-space:pre-wrap;background:#fdf2f1;padding:16px;border-radius:8px;">' +

}

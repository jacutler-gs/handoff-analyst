    border: '1px solid var(--border)',

  const borderColor = color === 'var(--text-dim)' ? 'var(--border)' : color + '33';

    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 4,
      padding: '3px 10px', borderRadius: 999, fontSize: 11, fontWeight: 500,
      color: color, background: bg, border: '1px solid ' + borderColor,
      letterSpacing: 0.3, textTransform: 'uppercase'
    }}>{props.children}</span>
  );
};

// ============================================================
const AskAnalyst = () => {
  const [open, setOpen] = useState(null);
  const renderLine = (line, idx) => {
    const parts = line.split(/(\*\*[^*]+\*\*)/g);
    return (
      <div key={idx} style={{ marginBottom: line === '' ? 8 : 0 }}>
        {parts.map((p, pi) =>
          p.startsWith('**') && p.endsWith('**')
            ? <strong key={pi} style={{ color: 'var(--text)' }}>{p.slice(2, -2)}</strong>
            : <span key={pi}>{p}</span>
        )}
      </div>
    );
  };
  return (
    <Card glow={true} style={{ marginBottom: 24, background: 'var(--gradient-soft)', borderColor: 'rgba(6,182,212,0.25)' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8, flexWrap: 'wrap', gap: 12 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{
            width: 28, height: 28, borderRadius: 8, background: 'linear-gradient(135deg, #06b6d4, #8b5cf6)',
            display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14
          }}>💬</div>
          <h2 style={{ fontSize: 16, fontWeight: 600 }}>Ask the Handoff Analyst</h2>
        </div>
        <SourceBadges sources={['Gainsight', 'Staircase', 'PX', 'Community', 'Skilljar']} />
      </div>
      <div style={{ fontSize: 12, color: 'var(--text-dim)', marginBottom: 16 }}>Pre-canned answers grounded in Gainsight + Staircase data · Click any question</div>
      <div style={{ display: 'grid', gap: 8 }}>
        {ANALYST_QA.map((qa, i) => (
          <div key={i} style={{
            background: 'rgba(0,0,0,0.25)', borderRadius: 10, border: '1px solid var(--border)',
            overflow: 'hidden'
          }}>
            <button
              onClick={() => setOpen(open === i ? null : i)}
              style={{
                width: '100%', textAlign: 'left', padding: 14, background: 'transparent',
                border: 'none', color: 'var(--text)', cursor: 'pointer',
                display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 10,
                fontSize: 13, fontWeight: 500
              }}
            >
              <span>{qa.q}</span>
              <span style={{ color: 'var(--accent-2)', fontSize: 16, transform: open === i ? 'rotate(90deg)' : 'none', transition: 'transform 0.2s' }}>›</span>
            </button>
            {open === i && (
              <div style={{
                padding: '14px', fontSize: 13, color: 'var(--text-dim)', lineHeight: 1.65,
                borderTop: '1px solid var(--border)', whiteSpace: 'pre-wrap'
              }}>
                {qa.a.split('\n').map(renderLine)}
              </div>
            )}
          </div>
        ))}
      </div>
    </Card>
  );
};
